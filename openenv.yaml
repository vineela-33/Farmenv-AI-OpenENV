name: FarmEnv-AI
version: "1.0"
description: OpenEnv environment for AI agent learning - Smart Farm simulation
entry_point: app.py

api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

environment:
  type: discrete
  observation_space: farm_state
  action_space: 5
  max_steps: 30

runtime:
  framework: flask
  port: 7860
